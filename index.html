<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa Culturama</title>
</head>
<body>
    <header>
        <h1>Pesquisa Online</h1>
    </header>
    <section>
        <form action="" method="get">
            <fieldset>
                <!-- DADOS PESSOAIS -->
                <legend>Dados pessoais</legend>
                <label for="userName">Nome</label>
                <input type="text" name="userName" required>
                <br>
                <label for="userAge">Idade</label>
                <input type="number" name="userAge" min="12" max="100" required>
                <br>
                <label for="birthDate">Data de nascimento</label>
                <input type="date" name="birthDate">
                <br>
                <label for="UserEmail">E-mail</label>
                <input type="email" name="UserEmail" required>
                <br>
                <label for="userPhone">Telefone</label>
                <input type="tel" name="userPhone" pattern="[0-9]{11}" placeholder="111111111111">
                <br>
                <label for="userImagem">Imagem</label>
                <input type="file" accept="image/*" name="userImage">
            </fieldset>
            <button type="submit">Enviar</button>

        </form>
    </section>
</body>
</html>
